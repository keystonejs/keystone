  '@prisma/client': ~7.8.0
  '@prisma/generator-helper': 7.8.0
  '@prisma/internals': 7.8.0
  better-sqlite3: ^12.6.0
  '@types/express': ^4.17.14
  '@types/node': ^24.0.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  express: ^4.19.2
  graphql: ^16.8.1
  next: ^16.2.10
  mariadb: 3.4.5
  pg: ^8.16.3
  prisma: ~7.8.0
  react: ^19.2.4
  react-dom: ^19.2.4
  typescript: ^6.0.0
allowBuilds:
  '@apollo/protobufjs': true
  '@parcel/watcher': true
  '@prisma/client': true
