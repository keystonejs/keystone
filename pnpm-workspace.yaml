packages:
  - 'docs'
  - 'examples/**'
  - 'packages/*'
  - 'tests/admin-ui-tests'
  - 'tests/api-tests'
  - 'tests/benchmarks'
  - 'tests/examples-smoke-tests'
  - 'tests/test-projects/*'
  - 'tests/sandbox'
  - 'tests/cli-tests'
  - 'tests2/'
  - 'prisma-utils'
  - '!**/node_modules/**'
allowBuilds:
  '@apollo/protobufjs': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  deasync: false
  esbuild: true
  prisma: true
  sharp: false
